name: careconnect-quickstart

services:
  postgres:
    image: postgres:15-alpine
    container_name: careconnect-quickstart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-careconnect}
      POSTGRES_USER: ${POSTGRES_USER:-careconnect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-careconnect_quickstart_password}
      POSTGRES_HOST_AUTH_METHOD: trust
      TZ: ${TZ:-Asia/Bangkok}
    volumes:
      - quickstart_postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - careconnect-network

  mock-provider:
    build:
      context: ./mock-provider
      dockerfile: Dockerfile
    image: careconnect-mock-provider:quickstart
    container_name: careconnect-quickstart-mock-provider
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4000
      MOCK_PROVIDER_PUBLIC_URL: ${MOCK_PROVIDER_PUBLIC_URL:-http://localhost:4001}
      BACKEND_WEBHOOK_URL: http://backend:3000/api/webhooks
      MOCK_PAYMENT_CALLBACK_URL: http://backend:3000/api/webhooks/payment
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-careconnect_quickstart_webhook_secret}
      MOCK_PAYMENT_AUTO_SUCCESS: ${MOCK_PAYMENT_AUTO_SUCCESS:-true}
      MOCK_PAYMENT_SUCCESS_DELAY_MS: ${MOCK_PAYMENT_SUCCESS_DELAY_MS:-3000}
      MOCK_SMS_OTP_CODE: ${MOCK_SMS_OTP_CODE:-123456}
      MOCK_EMAIL_OTP_CODE: ${MOCK_EMAIL_OTP_CODE:-123456}
      MOCK_KYC_AUTO_APPROVE: true
      MOCK_KYC_APPROVAL_DELAY_MS: 5000
      TZ: ${TZ:-Asia/Bangkok}
    ports:
      - "${MOCK_PROVIDER_PORT:-4001}:4000"
    networks:
      - careconnect-network

  migrate:
    image: careconnect-backend:quickstart
    container_name: careconnect-quickstart-migrate
    environment:
      NODE_ENV: development
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-careconnect}
      DATABASE_USER: ${POSTGRES_USER:-careconnect}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-careconnect_quickstart_password}
      JWT_SECRET: ${JWT_SECRET:-careconnect_quickstart_jwt_secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-careconnect_quickstart_webhook_secret}
      MOCK_PROVIDER_BASE_URL: http://mock-provider:4000
      WEBHOOK_BASE_URL: http://backend:3000
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      SMS_PROVIDER: ${SMS_PROVIDER:-mock}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-mock}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@careconnect.local}
      PUSH_PROVIDER: ${PUSH_PROVIDER:-mock}
      KYC_PROVIDER: ${KYC_PROVIDER:-mock}
      BANK_TRANSFER_PROVIDER: ${BANK_TRANSFER_PROVIDER:-mock}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-10}
      TZ: ${TZ:-Asia/Bangkok}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@careconnect.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin1234!}
      SEED_MOCK_CAREGIVERS: ${SEED_MOCK_CAREGIVERS:-true}
      SEED_MOCK_JOBS: ${SEED_MOCK_JOBS:-true}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8080}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      mock-provider:
        condition: service_started
    command: npm run migrate
    networks:
      - careconnect-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: careconnect-backend:quickstart
    container_name: careconnect-quickstart-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-careconnect}
      DATABASE_USER: ${POSTGRES_USER:-careconnect}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-careconnect_quickstart_password}
      JWT_SECRET: ${JWT_SECRET:-careconnect_quickstart_jwt_secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-careconnect_quickstart_webhook_secret}
      MOCK_PROVIDER_BASE_URL: http://mock-provider:4000
      WEBHOOK_BASE_URL: http://backend:3000
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      SMS_PROVIDER: ${SMS_PROVIDER:-mock}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-mock}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@careconnect.local}
      PUSH_PROVIDER: ${PUSH_PROVIDER:-mock}
      KYC_PROVIDER: ${KYC_PROVIDER:-mock}
      BANK_TRANSFER_PROVIDER: ${BANK_TRANSFER_PROVIDER:-mock}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-10}
      TZ: ${TZ:-Asia/Bangkok}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@careconnect.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin1234!}
      SEED_MOCK_CAREGIVERS: ${SEED_MOCK_CAREGIVERS:-true}
      SEED_MOCK_JOBS: ${SEED_MOCK_JOBS:-true}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8080}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - quickstart_backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      mock-provider:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    expose:
      - "3000"
    command: npm run start
    networks:
      - careconnect-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
        VITE_VAPID_PUBLIC_KEY: ${VITE_VAPID_PUBLIC_KEY:-}
    image: careconnect-frontend:quickstart
    container_name: careconnect-quickstart-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-8080}:80"
    networks:
      - careconnect-network

networks:
  careconnect-network:
    driver: bridge

volumes:
  quickstart_postgres_data:
    driver: local
  quickstart_backend_uploads:
    driver: local
