name: careconnect

services:
  postgres:
    image: postgres:15-alpine
    container_name: careconnect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-careconnect}
      POSTGRES_USER: ${POSTGRES_USER:-careconnect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      TZ: ${TZ:-Asia/Bangkok}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - careconnect-network

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: careconnect-backend
    container_name: careconnect-migrate
    environment:
      NODE_ENV: production
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-careconnect}
      DATABASE_USER: ${POSTGRES_USER:-careconnect}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - careconnect-network
    command: npm run migrate
    profiles: ["migrate"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: careconnect-backend
    container_name: careconnect-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-*}

      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-careconnect}
      DATABASE_USER: ${POSTGRES_USER:-careconnect}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}

      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}

      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?WEBHOOK_SECRET is required}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:?PAYMENT_PROVIDER is required}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_ACCOUNT_ID: ${STRIPE_ACCOUNT_ID:-}
      SMS_PROVIDER: ${SMS_PROVIDER:?SMS_PROVIDER is required}
      SMSOK_API_URL: ${SMSOK_API_URL:-https://api.smsok.co/s}
      SMSOK_API_KEY: ${SMSOK_API_KEY:-}
      SMSOK_API_SECRET: ${SMSOK_API_SECRET:-}
      SMSOK_SENDER: ${SMSOK_SENDER:-CareConnect}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:?EMAIL_PROVIDER is required}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@careconnect.local}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      PUSH_PROVIDER: ${PUSH_PROVIDER:?PUSH_PROVIDER is required}
      TZ: ${TZ:-Asia/Bangkok}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-10}

      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      BACKEND_URL: ${BACKEND_URL:?BACKEND_URL is required}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - careconnect-network
    expose:
      - "3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
        VITE_VAPID_PUBLIC_KEY: ${VITE_VAPID_PUBLIC_KEY:-}
    image: careconnect-frontend
    container_name: careconnect-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"
    networks:
      - careconnect-network

networks:
  careconnect-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local

