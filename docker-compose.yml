# ============================================================================
# Careconnect Docker Compose
# Version: 1.0.0
# Description: Complete development environment
# ============================================================================

name: careconnect

services:
  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: careconnect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: careconnect
      POSTGRES_USER: careconnect
      POSTGRES_PASSWORD: careconnect_dev_password
      POSTGRES_HOST_AUTH_METHOD: trust
      TZ: Asia/Bangkok
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careconnect"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - careconnect-network

  # ==========================================================================
  # Database Migration Service
  # ==========================================================================
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: careconnect-backend
    container_name: careconnect-migrate
    environment:
      NODE_ENV: development
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: careconnect
      DATABASE_USER: careconnect
      DATABASE_PASSWORD: careconnect_dev_password
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - careconnect-network
    command: npm run migrate
    profiles: ["migrate"]

  # ==========================================================================
  # Backend API
  # ==========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    image: careconnect-backend
    container_name: careconnect-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: ${PORT:-3000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}

      # Database
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-careconnect}
      DATABASE_USER: ${DATABASE_USER:-careconnect}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-careconnect_dev_password}

      # JWT
      JWT_SECRET: ${JWT_SECRET:-careconnect_jwt_secret_dev_only}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}

      # Mock Provider URLs
      MOCK_PROVIDER_BASE_URL: ${MOCK_PROVIDER_BASE_URL:-http://mock-provider:4000}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_ACCOUNT_ID: ${STRIPE_ACCOUNT_ID:-}
      SMS_PROVIDER: ${SMS_PROVIDER:-mock}
      KYC_PROVIDER: ${KYC_PROVIDER:-mock}
      BANK_TRANSFER_PROVIDER: ${BANK_TRANSFER_PROVIDER:-mock}

      # SMS - SMSOK
      SMSOK_API_URL: ${SMSOK_API_URL:-https://api.smsok.co/s}
      SMSOK_API_KEY: ${SMSOK_API_KEY:-}
      SMSOK_API_SECRET: ${SMSOK_API_SECRET:-}
      SMSOK_SENDER: ${SMSOK_SENDER:-CareConnect}

      # Webhooks (backend receives from mock provider)
      WEBHOOK_BASE_URL: http://backend:3000
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-careconnect_webhook_secret_dev}

      # File Storage
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-10}

      # Email
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-mock}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@careconnect.local}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}

      # Push Notifications (FCM - configure later)
      PUSH_PROVIDER: ${PUSH_PROVIDER:-mock}

      # Timezone
      TZ: ${TZ:-Asia/Bangkok}

      # Admin bootstrap
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@careconnect.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin1234!}
      SEED_MOCK_CAREGIVERS: ${SEED_MOCK_CAREGIVERS:-true}
      SEED_MOCK_JOBS: ${SEED_MOCK_JOBS:-true}

      # Google OAuth 2.0
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:3000}

    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      mock-provider:
        condition: service_started
    networks:
      - careconnect-network
    command: sh -c "npm run migrate && npm run dev"

  # ==========================================================================
  # Mock Provider Server
  # ==========================================================================
  mock-provider:
    build:
      context: ./mock-provider
      dockerfile: Dockerfile.dev
    image: careconnect-mock-provider
    container_name: careconnect-mock-provider
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4000

      # Webhook target (mock provider sends to backend)
      BACKEND_WEBHOOK_URL: ${BACKEND_WEBHOOK_URL:-http://backend:3000/api/webhooks}
      MOCK_PAYMENT_CALLBACK_URL: ${MOCK_PAYMENT_CALLBACK_URL:-http://backend:3000/api/webhooks/payment}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-careconnect_webhook_secret_dev}

      # Mock behavior settings
      MOCK_PAYMENT_AUTO_SUCCESS: ${MOCK_PAYMENT_AUTO_SUCCESS:-true}
      MOCK_PAYMENT_SUCCESS_DELAY_MS: ${MOCK_PAYMENT_SUCCESS_DELAY_MS:-3000}
      MOCK_SMS_OTP_CODE: ${MOCK_SMS_OTP_CODE:-123456}
      MOCK_EMAIL_OTP_CODE: ${MOCK_EMAIL_OTP_CODE:-123456}
      MOCK_KYC_AUTO_APPROVE: true
      MOCK_KYC_APPROVAL_DELAY_MS: 5000

      # Timezone
      TZ: Asia/Bangkok

    ports:
      - "4000:4000"
    volumes:
      - ./mock-provider:/app
      - /app/node_modules
    networks:
      - careconnect-network
    command: npm run dev

  # ==========================================================================
  # Frontend (React + Vite)
  # ==========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: careconnect-frontend
    container_name: careconnect-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      # Vite proxy target (Docker internal hostname)
      VITE_API_TARGET: ${VITE_API_TARGET:-http://backend:3000}
      VITE_API_URL: ${VITE_API_URL:-}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
      VITE_SOCKET_URL: ${VITE_SOCKET_URL:-}
      VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
      VITE_VAPID_PUBLIC_KEY: ${VITE_VAPID_PUBLIC_KEY:-}
      VITE_DEV_PORT: ${VITE_DEV_PORT:-5173}
      # External/tunnel access for Vite HMR (opt-in via shell/.env only)
      VITE_PUBLIC_HOST: ${VITE_PUBLIC_HOST:-}
      VITE_PUBLIC_PROTOCOL: ${VITE_PUBLIC_PROTOCOL:-}
      VITE_PUBLIC_PORT: ${VITE_PUBLIC_PORT:-}
      VITE_PUBLIC_HMR_PORT: ${VITE_PUBLIC_HMR_PORT:-}
      # Polling file watcher is opt-in to avoid hot-reload loops on some machines
      VITE_USE_POLLING: ${VITE_USE_POLLING:-false}
      VITE_POLL_INTERVAL: ${VITE_POLL_INTERVAL:-300}
    ports:
      - "${VITE_DEV_PORT:-5173}:${VITE_DEV_PORT:-5173}"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - careconnect-network
    command: npm run dev -- --host 0.0.0.0

  # ==========================================================================
  # pgAdmin (Optional - for database management)
  # ==========================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: careconnect-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@careconnect.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - careconnect-network

# ============================================================================
# Networks
# ============================================================================
networks:
  careconnect-network:
    driver: bridge

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
    driver: local
  backend_node_modules:
    driver: local
  backend_uploads:
    driver: local
  pgadmin_data:
    driver: local
